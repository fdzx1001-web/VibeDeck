name: Build Native Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Project Files & Force Clean Install
        run: |
          sudo apt-get install unzip
          unzip vibedeck..zip -d project_files
          mv project_files/* . || true
          mv project_files/.* . || true
          rm -f package-lock.json
          
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install & Setup Capacitor Shell
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
      - name: Create Capacitor Config
        run: |
          echo '{
            "appId": "com.zotxstudios.vibedeck",
            "appName": "VibeDeck",
            "webDir": "dist"
          }' > capacitor.config.json

      - name: Build Assets & Compile APK
        run: |
          npm run build
          npx cap add android
          npx cap sync
          cd android && ./gradlew assembleDebug
          
      - name: Upload Real APK
        uses: actions/upload-artifact@v4
        with:
          name: VibeDeck-Native-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
